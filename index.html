<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiumo Creator Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 32px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid #222;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff6b9d;
            object-fit: cover;
            background: #222;
        }
        .profile-info h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .profile-info .username {
            color: #888;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .profile-info .bio {
            color: #aaa;
            font-size: 14px;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #ff6b9d;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .stat-card .label {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        .section-subtitle {
            font-size: 13px;
            color: #666;
        }

        /* Refresh Button */
        .refresh-btn {
            background: #ff6b9d;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-btn:hover { background: #ff4d8a; }
        .refresh-btn:active { transform: scale(0.98); }
        .refresh-btn:disabled { background: #444; cursor: not-allowed; }
        .refresh-btn .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Loading State */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #222;
            border-top-color: #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text { color: #888; font-size: 14px; }

        /* Error State */
        .error-banner {
            display: none;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            color: #ff5252;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
        }
        .error-banner.active { display: block; }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .post-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        .post-card:hover {
            transform: translateY(-4px);
            border-color: #333;
        }
        .post-card .thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            background: #1a1a1a;
        }
        .post-card .info {
            padding: 16px;
        }
        .post-card .engagement {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
        }
        .post-card .engagement span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #888;
        }
        .post-card .caption {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-card .type-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(255,107,157,0.15);
            color: #ff6b9d;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-avatar { width: 120px; height: 120px; border-radius: 50%; }
        .skeleton-text { height: 20px; border-radius: 4px; margin-bottom: 8px; }
        .skeleton-card { aspect-ratio: 1; border-radius: 16px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 12px; }
        .modal-close {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .modal-close:hover { opacity: 1; }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; padding: 24px; }
            .avatar, .skeleton-avatar { width: 100px; height: 100px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 28px; }
            .posts-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading data from Instagram...</div>
    </div>

    <div class="container">
        <!-- Error Banner -->
        <div class="error-banner" id="error-banner"></div>

        <!-- Header -->
        <header class="header" id="header">
            <img src="images/profile.jpg" alt="Profile" class="avatar" id="avatar">
            <div class="profile-info">
                <h1 id="fullName">Loading...</h1>
                <p class="username" id="username">@...</p>
                <p class="bio" id="bio"></p>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card">
                <div class="value" id="stat-posts">-</div>
                <div class="label">Posts</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-followers">-</div>
                <div class="label">Followers</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-following">-</div>
                <div class="label">Following</div>
            </div>
            <div class="stat-card">
                <div class="value" id="stat-likes">-</div>
                <div class="label">Total Likes</div>
            </div>
        </div>

        <!-- Content Section -->
        <div class="section-header">
            <div>
                <h2 class="section-title">Content</h2>
                <p class="section-subtitle" id="update-time">Click refresh to load data</p>
            </div>
            <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
                <span id="refresh-icon">↻</span> Refresh
            </button>
        </div>

        <div class="posts-grid" id="posts-container"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img src="" alt="" id="modal-img">
    </div>

    <script>
        // Configuration
        const CONFIG = {
            username: 'saka.yiumo',
            // API endpoint - change this to your deployed API URL
            apiUrl: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:3456'
                : 'https://saka-api.your-domain.workers.dev', // Replace with your Cloudflare Worker URL
            cacheKey: 'saka_dashboard_cache',
            cacheDuration: 5 * 60 * 1000 // 5 minutes
        };

        let isLoading = false;

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
            const btn = document.getElementById('refresh-btn');
            btn.disabled = show;
            document.getElementById('refresh-icon').innerHTML = show
                ? '<div class="spinner"></div>'
                : '↻';
        }

        function showError(message) {
            const banner = document.getElementById('error-banner');
            banner.textContent = message;
            banner.classList.add('active');
        }

        function hideError() {
            document.getElementById('error-banner').classList.remove('active');
        }

        function updateProfile(profile) {
            document.getElementById('fullName').textContent = profile.fullName || profile.username;
            document.getElementById('username').textContent = '@' + profile.username;
            document.getElementById('bio').textContent = profile.bio || '';
            if (profile.profilePic) {
                document.getElementById('avatar').src = profile.profilePic;
            }
            document.getElementById('stat-posts').textContent = formatNumber(profile.postsCount);
            document.getElementById('stat-followers').textContent = formatNumber(profile.followers);
            document.getElementById('stat-following').textContent = formatNumber(profile.following);
        }

        function renderPosts(posts) {
            const container = document.getElementById('posts-container');

            // Calculate total likes
            const totalLikes = posts.reduce((sum, p) => sum + (p.likes || 0), 0);
            document.getElementById('stat-likes').textContent = formatNumber(totalLikes);

            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <img src="${post.thumbnail || 'images/placeholder.jpg'}"
                         alt="Post"
                         class="thumbnail"
                         onclick="openModal('${post.thumbnail}')"
                         onerror="this.style.background='#222'; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23222%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23444%22 dy=%22.3em%22>No Image</text></svg>'">
                    <div class="info">
                        <span class="type-badge">${post.type || 'Post'}</span>
                        <div class="engagement">
                            <span>❤️ ${formatNumber(post.likes || 0)}</span>
                            <span>💬 ${formatNumber(post.comments || 0)}</span>
                        </div>
                        <p class="caption">${post.caption || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        function getCachedData() {
            try {
                const cached = localStorage.getItem(CONFIG.cacheKey);
                if (!cached) return null;
                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp > CONFIG.cacheDuration) return null;
                return data;
            } catch (e) {
                return null;
            }
        }

        function setCachedData(data) {
            try {
                localStorage.setItem(CONFIG.cacheKey, JSON.stringify({
                    data,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }

        async function loadData(forceRefresh = true) {
            if (isLoading) return;

            hideError();

            // Try cache first (only on initial load)
            if (!forceRefresh) {
                const cached = getCachedData();
                if (cached) {
                    updateProfile(cached.profile);
                    renderPosts(cached.posts);
                    document.getElementById('update-time').textContent =
                        `Cached: ${new Date(cached.timestamp).toLocaleString()}`;
                    return;
                }
            }

            isLoading = true;
            showLoading(true);

            try {
                const response = await fetch(`${CONFIG.apiUrl}/api/user?username=${CONFIG.username}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || 'API request failed');
                }

                const { profile, posts } = result.data;

                updateProfile(profile);
                renderPosts(posts);
                setCachedData({ profile, posts, timestamp: result.timestamp });

                document.getElementById('update-time').textContent =
                    `Updated: ${new Date(result.timestamp).toLocaleString()}`;

            } catch (error) {
                console.error('Failed to load data:', error);
                showError(`Failed to load data: ${error.message}. Make sure the API server is running.`);

                // Try to show cached data as fallback
                const cached = getCachedData();
                if (cached) {
                    updateProfile(cached.profile);
                    renderPosts(cached.posts);
                    document.getElementById('update-time').textContent =
                        `Showing cached data from ${new Date(cached.timestamp).toLocaleString()}`;
                }
            } finally {
                isLoading = false;
                showLoading(false);
            }
        }

        function openModal(src) {
            if (!src) return;
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Load data on page load (try cache first)
        loadData(false);
    </script>
</body>
</html>
