<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saka Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .profile {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff6b9d;
            margin-bottom: 10px;
        }
        .profile h2 { font-size: 18px; margin-bottom: 5px; }
        .profile p { color: #888; font-size: 14px; }
        .verified { color: #3897f0; margin-left: 5px; }
        .nav a {
            display: block;
            padding: 12px 15px;
            color: #aaa;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            background: linear-gradient(90deg, #ff6b9d, #c44569);
            color: #fff;
        }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 28px; }
        .header span { color: #888; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(196,69,105,0.2));
            border: 1px solid rgba(255,107,157,0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }
        .stat-card h3 { font-size: 32px; margin-bottom: 5px; color: #ff6b9d; }
        .stat-card p { color: #aaa; font-size: 14px; }
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff6b9d;
            display: inline-block;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .post-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .post-card:hover { transform: translateY(-5px); }
        .post-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            cursor: pointer;
        }
        .post-info { padding: 15px; }
        .post-info .engagement {
            display: flex;
            gap: 15px;
            color: #aaa;
            font-size: 14px;
        }
        .post-info .engagement span { display: flex; align-items: center; gap: 5px; }
        .post-info .caption {
            margin-top: 10px;
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .modal-close {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <img src="${post.image}" alt="Post" onclick="openModal('${post.image}')" onerror="this.src='https://via.placeholder.com/640x640?text=Image+Not+Available'">
                    <div class="post-info">
                        <div class="engagement">
                            <span>❤️ ${formatNumber(post.likes)}</span>
                            <span>💬 ${formatNumber(post.comments)}</span>
                        </div>
                        <p class="caption">${post.caption}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        renderPosts();
