<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiumo Creator Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 32px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid #222;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff6b9d;
            object-fit: cover;
        }
        .profile-info h1 { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
        .profile-info .username { color: #888; font-size: 16px; margin-bottom: 8px; }
        .profile-info .bio { color: #aaa; font-size: 14px; }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: #ff6b9d; }
        .stat-card .value { font-size: 36px; font-weight: 700; margin-bottom: 4px; }
        .stat-card .label { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-title { font-size: 20px; font-weight: 600; }
        .section-subtitle { font-size: 13px; color: #666; }
        .update-badge { font-size: 12px; color: #ff6b9d; }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .post-card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .post-card:hover { transform: translateY(-4px); border-color: #333; }
        .post-card .thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            cursor: pointer;
            background: #1a1a1a;
        }
        .post-card .info { padding: 16px; }
        .post-card .engagement {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
        }
        .post-card .engagement span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #888;
        }
        .post-card .caption {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-card .type-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(255,107,157,0.15);
            color: #ff6b9d;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 12px; }
        .modal-close {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }
        .modal-close:hover { opacity: 1; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; text-align: center; padding: 24px; }
            .avatar { width: 100px; height: 100px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-card .value { font-size: 28px; }
            .posts-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function renderPosts() {
            document.getElementById('posts-container').innerHTML = posts.map(post => `
                <div class="post-card">
                    <img src="${post.image}" alt="Post" class="thumbnail" onclick="openModal('${post.image}')" onerror="this.style.background='#222'">
                    <div class="info">
                        <span class="type-badge">${post.type}${post.pinned ? ' • Pinned' : ''}</span>
                        <div class="engagement">
                            <span>❤️ ${formatNumber(post.likes)}</span>
                            <span>💬 ${formatNumber(post.comments)}</span>
                        </div>
                        <p class="caption">${post.caption}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        renderPosts();
    </script>
